plugins {
    id 'java-library'
    id 'maven-publish'
}

tasks.withType(JavaCompile).configureEach {
    options.release = 8
}

dependencies {
    // Gson for plugin messaging serialization (provided by Minecraft servers at runtime)
    compileOnly "com.google.code.gson:gson:${project.property('gsonVersion')}"
}

// Generate BuildConstants.java with version from gradle.properties
def generatedDir = layout.buildDirectory.dir('generated/sources/buildConstants/java/main')

sourceSets {
    main {
        java {
            srcDir generatedDir
        }
    }
}

tasks.register('generateBuildConstants') {
    def outputDir = generatedDir.get().asFile
    outputs.dir(outputDir)

    doLast {
        def constantsFile = new File(outputDir, 'net/analyse/api/BuildConstants.java')
        constantsFile.parentFile.mkdirs()
        constantsFile.text = """package net.analyse.api;

/**
 * Auto-generated build constants from Gradle.
 * Available to all modules that depend on the API.
 */
public final class BuildConstants {

  public static final String VERSION = "${rootProject.version}";

  private BuildConstants() {
  }
}
"""
    }
}

tasks.named('compileJava') {
    dependsOn 'generateBuildConstants'
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java

            groupId = 'net.analyse'
            artifactId = 'analyse-api'
            version = rootProject.version

            pom {
                name = 'Analyse API'
                description = 'Public API for the Analyse analytics plugin'
                url = 'https://analyse.net'

                licenses {
                    license {
                        name = 'Analyse Proprietary License'
                        url = 'https://github.com/track/analyse-java/blob/main/LICENSE'
                        distribution = 'repo'
                    }
                }

                organization {
                    name = 'VertCode Development E.E.'
                    url = 'https://analyse.net'
                }
            }
        }
    }

    repositories {
        maven {
            name = 'nexus'
            def releasesUrl = System.getenv('NEXUS_RELEASES_URL') ?: 'https://nexus.example.com/repository/maven-releases/'
            def snapshotsUrl = System.getenv('NEXUS_SNAPSHOTS_URL') ?: 'https://nexus.example.com/repository/maven-snapshots/'
            url = version.toString().endsWith('SNAPSHOT') ? snapshotsUrl : releasesUrl

            credentials {
                username = System.getenv('NEXUS_USER') ?: ''
                password = System.getenv('NEXUS_PASS') ?: ''
            }
        }
    }
}
