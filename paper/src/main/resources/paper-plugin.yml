name: ServerStats
version: ${version}
main: com.serverstats.paper.ServerStatsPlugin
api-version: "1.21"
description: ServerStats tracking plugin
author: VertCode

permissions:
  serverstats.command:
    description: Base permission for serverstats commands
    default: op
  serverstats.command.reload:
    description: Permission to reload the plugin
    default: op
  serverstats.command.debug:
    description: Permission to toggle debug mode
    default: op
  serverstats.command.event:
    description: Permission to send custom events
    default: op
