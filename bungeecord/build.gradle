plugins {
    id 'java'
    id 'com.gradleup.shadow'
}

dependencies {
    implementation project(':api')
    implementation project(':sdk')
    implementation "co.aikar:acf-bungee:${project.property('acfVersion')}"
    compileOnly "net.md-5:bungeecord-api:${project.property('bungeecordVersion')}"
}

tasks.named('shadowJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    archiveBaseName.set('serverstats-bungeecord')
    archiveClassifier.set('')
    // BungeeCord already includes Gson, so exclude it
    dependencies {
        exclude(dependency('com.google.code.gson:gson'))
    }
}

tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}

processResources {
    def props = [version: version]
    inputs.properties props
    filteringCharset 'UTF-8'
    filesMatching('bungee.yml') {
        expand props
    }
}
